<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Manage Events | EventCommand</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#131b2e",
                        "on-primary-container": "#7c839b",
                        "on-surface": "#1b1b1d",
                        "on-surface-variant": "#45464d",
                        "surface": "#fcf8fa",
                        "surface-container": "#f0edef",
                        "surface-container-low": "#f6f3f5",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c6c6cd",
                        "outline": "#76777d",
                        "primary": "#000000",
                        "background": "#fcf8fa",
                        "on-primary": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "container-max": "1440px",
                        "sidebar-width": "280px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "24px"
                    },
                    fontFamily: {
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <!-- Import shared scripts -->
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/nav.js"></script>
</head>
<body class="bg-[#fcf8fa] dark:bg-[#0b0c10] text-[#1b1b1d] dark:text-[#c5c6c7] font-body-md min-h-screen flex transition-colors duration-200">

    <!-- Shell Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content Wrapper -->
    <div class="flex-grow md:pl-sidebar-width flex flex-col min-h-screen">
        <!-- Shell Header -->
        <div id="header-container"></div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-10 opacity-0 bg-neutral-900 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-2 transition-all duration-300 pointer-events-none">
            <span class="material-symbols-outlined text-green-400">check_circle</span>
            <span id="toast-text">Success message</span>
        </div>

        <!-- Main Content Canvas -->
        <main class="flex-grow p-margin-mobile md:p-margin-desktop max-w-container-max w-full mx-auto space-y-stack-lg">
            
            <!-- Page Title Action Bar -->
            <div class="flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                <div>
                    <h2 class="font-headline-lg text-3xl font-bold tracking-tight text-on-surface dark:text-white">Manage Events</h2>
                    <p class="text-body-sm text-on-surface-variant dark:text-gray-400">Create, edit, cancel, and oversee attendee metrics for your event portfolio.</p>
                </div>
                <div>
                    <button id="open-create-modal-btn" class="py-2.5 px-5 bg-violet-600 hover:bg-violet-750 text-white rounded font-label-md text-xs font-bold flex items-center gap-2 shadow-sm transition-all active:scale-[0.98]">
                        <span class="material-symbols-outlined text-[18px]">add</span>
                        Create Event
                    </button>
                </div>
            </div>

            <!-- Management Section -->
            <section class="bg-surface-container-lowest dark:bg-neutral-900/40 border border-outline-variant dark:border-neutral-800/60 rounded-xl shadow-sm overflow-hidden">
                
                <!-- Table Search & Filters -->
                <div class="p-4 border-b border-outline-variant dark:border-neutral-800/60 bg-surface-container-low dark:bg-neutral-900/80 flex flex-col sm:flex-row gap-4 justify-between items-center">
                    <div class="relative max-w-xs w-full">
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                        <input type="text" id="table-search" placeholder="Search portfolio..." class="w-full pl-10 pr-4 py-2 bg-surface dark:bg-neutral-800 border border-outline-variant/60 dark:border-neutral-700/60 rounded text-body-sm text-on-surface focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20 transition-all"/>
                    </div>
                    <div class="flex gap-2">
                        <select id="status-filter" class="py-2 px-3 bg-surface dark:bg-neutral-800 border border-outline-variant/60 dark:border-neutral-700/60 rounded text-body-sm text-on-surface focus:outline-none focus:border-violet-500 transition-all">
                            <option value="all">All Statuses</option>
                            <option value="Confirmed">Confirmed</option>
                            <option value="Draft">Draft</option>
                            <option value="Cancelled">Cancelled</option>
                            <option value="Completed">Completed</option>
                        </select>
                    </div>
                </div>

                <!-- Comfortable Density Data Table -->
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse text-body-sm">
                        <thead>
                            <tr class="bg-surface-container dark:bg-neutral-900/80 border-b border-outline-variant dark:border-neutral-800 text-on-surface-variant dark:text-gray-400 font-label-md text-[11px] uppercase tracking-wider">
                                <th class="py-3.5 px-6 font-semibold">Event Name</th>
                                <th class="py-3.5 px-4 font-semibold">Date</th>
                                <th class="py-3.5 px-4 font-semibold">Venue</th>
                                <th class="py-3.5 px-4 font-semibold text-center">Registrations</th>
                                <th class="py-3.5 px-4 font-semibold">Status</th>
                                <th class="py-3.5 px-6 font-semibold text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="management-table-body" class="divide-y divide-outline-variant/60 dark:divide-neutral-800/40 text-on-surface dark:text-gray-300">
                            <!-- Populated dynamically by JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Create/Edit Event Modal Form (Slide-over overlay style) -->
    <div id="form-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm hidden justify-end transition-opacity duration-300">
        <div class="bg-surface-container-lowest dark:bg-neutral-900 w-full max-w-lg h-full p-stack-lg shadow-2xl flex flex-col justify-between border-l border-outline-variant dark:border-neutral-800 transform translate-x-full transition-transform duration-300" id="form-modal-panel">
            <!-- Modal Header -->
            <div class="flex justify-between items-center pb-4 border-b border-outline-variant dark:border-neutral-800">
                <div>
                    <h3 class="font-headline-md text-lg font-bold text-on-surface dark:text-white" id="modal-title">Create New Event</h3>
                    <p class="text-[12px] text-on-surface-variant dark:text-gray-400">Define parameters for your executive portal session.</p>
                </div>
                <button id="close-modal-btn" class="p-1 rounded hover:bg-surface-container text-on-surface-variant hover:text-on-surface">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>

            <!-- Modal Scrollable Content -->
            <form id="event-form" class="flex-grow py-stack-lg overflow-y-auto space-y-4 pr-1">
                <input type="hidden" id="edit-event-id" value=""/>

                <!-- Title -->
                <div class="space-y-1">
                    <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-title">Event Title</label>
                    <input type="text" id="event-title" required class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20" placeholder="e.g. AI DevCon 2026"/>
                </div>

                <!-- Date & Venue Grid -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-date">Date</label>
                        <input type="date" id="event-date" required class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20"/>
                    </div>
                    <div class="space-y-1">
                        <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-type">Type</label>
                        <select id="event-type" class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20">
                            <option value="Conference">Conference</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Networking">Networking</option>
                        </select>
                    </div>
                </div>

                <!-- Venue Location -->
                <div class="space-y-1">
                    <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-venue">Venue / Location</label>
                    <input type="text" id="event-venue" required class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20" placeholder="e.g. Moscone Center, San Francisco"/>
                </div>

                <!-- Capacity & Price -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1">
                        <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-capacity">Capacity</label>
                        <input type="number" id="event-capacity" required min="10" class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20" placeholder="e.g. 200"/>
                    </div>
                    <div class="space-y-1">
                        <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-price">Ticket Price</label>
                        <input type="text" id="event-price" required class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20" placeholder="e.g. Free or $299"/>
                    </div>
                </div>

                <!-- Image URL -->
                <div class="space-y-1">
                    <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-image">Banner Image URL</label>
                    <input type="text" id="event-image" class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20" placeholder="e.g. https://images.unsplash.com/..."/>
                </div>

                <!-- Description -->
                <div class="space-y-1">
                    <label class="block font-label-md text-[11px] text-on-surface-variant uppercase tracking-wider font-semibold" for="event-desc">Description</label>
                    <textarea id="event-desc" rows="4" required class="w-full px-3 py-2 bg-surface dark:bg-neutral-850 border border-outline-variant dark:border-neutral-700/60 rounded text-body-sm focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20" placeholder="Describe this event in detail..."></textarea>
                </div>
            </form>

            <!-- Modal Footer -->
            <div class="pt-4 border-t border-outline-variant dark:border-neutral-800 flex gap-stack-sm justify-end">
                <button type="button" id="cancel-form-btn" class="px-4 py-2 bg-surface hover:bg-surface-container dark:bg-neutral-800 dark:hover:bg-neutral-700/80 border border-outline-variant dark:border-neutral-700/60 text-on-surface dark:text-white rounded text-label-md text-xs font-bold transition-all">Cancel</button>
                <button type="submit" form="event-form" id="submit-form-btn" class="px-5 py-2 bg-violet-600 hover:bg-violet-750 text-white rounded text-label-md text-xs font-bold shadow-sm transition-all active:scale-[0.98]">Save Event</button>
            </div>
        </div>
    </div>

    <!-- Page Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderTable();

            // Toggle Search & Filters
            document.getElementById('table-search').addEventListener('input', renderTable);
            document.getElementById('status-filter').addEventListener('change', renderTable);

            // Modal Toggles
            const modal = document.getElementById('form-modal');
            const modalPanel = document.getElementById('form-modal-panel');
            const openModalBtn = document.getElementById('open-create-modal-btn');
            const closeModalBtn = document.getElementById('close-modal-btn');
            const cancelFormBtn = document.getElementById('cancel-form-btn');
            const eventForm = document.getElementById('event-form');

            const openModal = (editId = null) => {
                eventForm.reset();
                document.getElementById('edit-event-id').value = '';
                document.getElementById('modal-title').innerText = "Create New Event";

                if (editId) {
                    const e = window.EC_DB.getEventById(editId);
                    if (e) {
                        document.getElementById('edit-event-id').value = e.id;
                        document.getElementById('event-title').value = e.title;
                        document.getElementById('event-date').value = e.date;
                        document.getElementById('event-type').value = e.type;
                        document.getElementById('event-venue').value = e.venue;
                        document.getElementById('event-capacity').value = e.capacity;
                        document.getElementById('event-price').value = e.price;
                        document.getElementById('event-image').value = e.image;
                        document.getElementById('event-desc').value = e.description;
                        document.getElementById('modal-title').innerText = "Edit Event Parameters";
                    }
                }

                modal.classList.remove('hidden');
                modal.classList.add('flex');
                setTimeout(() => {
                    modalPanel.classList.remove('translate-x-full');
                    modalPanel.classList.add('translate-x-0');
                }, 50);
            };

            const closeModal = () => {
                modalPanel.classList.remove('translate-x-0');
                modalPanel.classList.add('translate-x-full');
                setTimeout(() => {
                    modal.classList.remove('flex');
                    modal.classList.add('hidden');
                }, 300);
            };

            openModalBtn.addEventListener('click', () => openModal());
            closeModalBtn.addEventListener('click', closeModal);
            cancelFormBtn.addEventListener('click', closeModal);

            // Check URL parameters for ?create=true
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('create') === 'true') {
                openModal();
            }

            // Form Submission
            eventForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const editId = document.getElementById('edit-event-id').value;

                const eventData = {
                    title: document.getElementById('event-title').value.trim(),
                    date: document.getElementById('event-date').value,
                    type: document.getElementById('event-type').value,
                    venue: document.getElementById('event-venue').value.trim(),
                    capacity: parseInt(document.getElementById('event-capacity').value),
                    price: document.getElementById('event-price').value.trim(),
                    image: document.getElementById('event-image').value.trim(),
                    description: document.getElementById('event-desc').value.trim()
                };

                if (editId) {
                    window.EC_DB.updateEvent(editId, eventData);
                    showToast('Event updated successfully!');
                } else {
                    window.EC_DB.createEvent(eventData);
                    showToast('Event created successfully!');
                }

                closeModal();
                renderTable();
            });

            // Global click bindings for actions menu close
            window.addEventListener('click', (e) => {
                if (!e.target.closest('.action-menu-container')) {
                    document.querySelectorAll('.action-dropdown-menu').forEach(m => m.classList.add('hidden'));
                }
            });
        });

        function renderTable() {
            const events = window.EC_DB.getEvents();
            const search = document.getElementById('table-search').value.toLowerCase().trim();
            const status = document.getElementById('status-filter').value;

            const filtered = events.filter(e => {
                const matchesSearch = e.title.toLowerCase().includes(search) || e.venue.toLowerCase().includes(search);
                const matchesStatus = status === 'all' || e.status === status;
                return matchesSearch && matchesStatus;
            });

            const body = document.getElementById('management-table-body');
            body.innerHTML = '';

            if (filtered.length === 0) {
                body.innerHTML = `
                    <tr>
                        <td colspan="6" class="py-8 text-center text-on-surface-variant dark:text-gray-500">
                            No events found matching current criteria.
                        </td>
                    </tr>
                `;
                return;
            }

            filtered.forEach(e => {
                const isCompleted = e.status === 'Completed';
                
                let pillClass = "border px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider inline-flex ";
                if (e.status === 'Confirmed') pillClass += "bg-green-100 text-green-800 border-green-200 dark:bg-green-950/40 dark:text-green-300 dark:border-green-800/40";
                else if (e.status === 'Cancelled') pillClass += "bg-red-100 text-red-800 border-red-200 dark:bg-red-950/40 dark:text-red-300 dark:border-red-800/40";
                else if (e.status === 'Completed') pillClass += "bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-950/40 dark:text-blue-300 dark:border-blue-800/40";
                else pillClass += "bg-gray-100 text-gray-800 border-gray-200 dark:bg-neutral-800 dark:text-gray-300 dark:border-neutral-700/60";

                const row = document.createElement('tr');
                row.className = "hover:bg-surface-container-low dark:hover:bg-neutral-900/50 transition-colors";
                row.innerHTML = `
                    <td class="py-3.5 px-6 font-semibold text-on-surface dark:text-white leading-tight">
                        <div class="flex items-center gap-3">
                            <img src="${e.image}" alt="${e.title}" class="w-10 h-7 rounded object-cover border border-outline-variant/30 hidden sm:block"/>
                            <span>${e.title}</span>
                        </div>
                    </td>
                    <td class="py-3.5 px-4 text-on-surface-variant dark:text-gray-400 text-xs whitespace-nowrap">${formatDate(e.date)}</td>
                    <td class="py-3.5 px-4 text-on-surface-variant dark:text-gray-400 text-xs max-w-[140px] truncate">${e.venue}</td>
                    <td class="py-3.5 px-4 text-center text-on-surface font-semibold dark:text-white text-xs">${e.registrationsCount} / ${e.capacity}</td>
                    <td class="py-3.5 px-4">
                        <span class="${pillClass}">${e.status}</span>
                    </td>
                    <td class="py-3.5 px-6 text-right relative">
                        <div class="inline-block text-left action-menu-container">
                            <button onclick="toggleActionMenu('${e.id}', event)" class="p-1 rounded hover:bg-surface-container dark:hover:bg-neutral-800 text-on-surface-variant hover:text-on-surface flex items-center justify-center">
                                <span class="material-symbols-outlined text-[20px]">more_vert</span>
                            </button>
                            <!-- Dropdown -->
                            <div id="drop-${e.id}" class="action-dropdown-menu hidden absolute right-6 top-10 w-36 bg-surface-container-lowest dark:bg-neutral-900 border border-outline-variant dark:border-neutral-850 rounded shadow-lg z-30 py-1 font-label-md text-xs text-left">
                                <button onclick="editEvent('${e.id}', event)" class="w-full px-4 py-2 hover:bg-surface-container dark:hover:bg-neutral-800 text-on-surface dark:text-white flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[16px]">edit</span> Edit
                                </button>
                                ${!isCompleted ? `
                                    <button onclick="toggleEventStatus('${e.id}', event)" class="w-full px-4 py-2 hover:bg-surface-container dark:hover:bg-neutral-800 text-on-surface dark:text-white flex items-center gap-2">
                                        <span class="material-symbols-outlined text-[16px]">swap_horiz</span> Toggle Status
                                    </button>
                                ` : ''}
                                <button onclick="deleteEvent('${e.id}', event)" class="w-full px-4 py-2 hover:bg-red-50 dark:hover:bg-red-950/20 text-red-600 dark:text-red-400 flex items-center gap-2">
                                    <span class="material-symbols-outlined text-[16px]">delete</span> Delete
                                </button>
                            </div>
                        </div>
                    </td>
                `;
                body.appendChild(row);
            });
        }

        // Action menu dropdown toggle
        window.toggleActionMenu = function(id, event) {
            event.stopPropagation();
            const isOpen = !document.getElementById(`drop-${id}`).classList.contains('hidden');
            document.querySelectorAll('.action-dropdown-menu').forEach(m => m.classList.add('hidden'));
            if (!isOpen) {
                document.getElementById(`drop-${id}`).classList.remove('hidden');
            }
        };

        // Actions
        window.editEvent = function(id, event) {
            event.stopPropagation();
            document.querySelectorAll('.action-dropdown-menu').forEach(m => m.classList.add('hidden'));
            const modal = document.getElementById('form-modal');
            const modalPanel = document.getElementById('form-modal-panel');
            
            // Populates edit data
            const e = window.EC_DB.getEventById(id);
            if (e) {
                document.getElementById('edit-event-id').value = e.id;
                document.getElementById('event-title').value = e.title;
                document.getElementById('event-date').value = e.date;
                document.getElementById('event-type').value = e.type;
                document.getElementById('event-venue').value = e.venue;
                document.getElementById('event-capacity').value = e.capacity;
                document.getElementById('event-price').value = e.price;
                document.getElementById('event-image').value = e.image;
                document.getElementById('event-desc').value = e.description;
                document.getElementById('modal-title').innerText = "Edit Event Parameters";
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalPanel.classList.remove('translate-x-full');
                modalPanel.classList.add('translate-x-0');
            }, 50);
        };

        window.toggleEventStatus = function(id, event) {
            event.stopPropagation();
            document.querySelectorAll('.action-dropdown-menu').forEach(m => m.classList.add('hidden'));
            const e = window.EC_DB.getEventById(id);
            if (e) {
                const nextStatus = e.status === 'Confirmed' ? 'Cancelled' : e.status === 'Cancelled' ? 'Draft' : 'Confirmed';
                window.EC_DB.updateEvent(id, { status: nextStatus });
                showToast(`Event status updated to ${nextStatus}.`);
                renderTable();
            }
        };

        window.deleteEvent = function(id, event) {
            event.stopPropagation();
            document.querySelectorAll('.action-dropdown-menu').forEach(m => m.classList.add('hidden'));
            if (confirm('Are you sure you want to permanently delete this event from the portfolio database?')) {
                window.EC_DB.deleteEvent(id);
                showToast('Event permanently deleted.');
                renderTable();
            }
        };

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = message;
            
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }
    </script>
    <script>
        // Start shell nav
        window.EC_Nav.renderShell('manage');
    </script>
</body>
</html>
