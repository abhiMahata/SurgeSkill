<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Explore Events | EventCommand</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;600&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#131b2e",
                        "on-primary-container": "#7c839b",
                        "on-surface": "#1b1b1d",
                        "on-surface-variant": "#45464d",
                        "surface": "#fcf8fa",
                        "surface-container": "#f0edef",
                        "surface-container-low": "#f6f3f5",
                        "surface-container-lowest": "#ffffff",
                        "outline-variant": "#c6c6cd",
                        "outline": "#76777d",
                        "primary": "#000000",
                        "background": "#fcf8fa",
                        "on-primary": "#ffffff"
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                    spacing: {
                        "container-max": "1440px",
                        "sidebar-width": "280px",
                        "margin-mobile": "16px",
                        "margin-desktop": "32px",
                        "stack-sm": "8px",
                        "stack-md": "16px",
                        "stack-lg": "24px"
                    },
                    fontFamily: {
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "headline-sm": ["Hanken Grotesk"],
                        "display-lg": ["Hanken Grotesk"],
                        "body-md": ["Inter"],
                        "body-sm": ["Inter"],
                        "label-md": ["Inter"]
                    }
                }
            }
        };
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
    <!-- Import shared scripts -->
    <script src="../assets/js/db.js"></script>
    <script src="../assets/js/nav.js"></script>
</head>
<body class="bg-[#fcf8fa] dark:bg-[#0b0c10] text-[#1b1b1d] dark:text-[#c5c6c7] font-body-md min-h-screen flex transition-colors duration-200">

    <!-- Shell Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Main Content Wrapper -->
    <div class="flex-grow md:pl-sidebar-width flex flex-col min-h-screen">
        <!-- Shell Header -->
        <div id="header-container"></div>

        <!-- Toast Notification -->
        <div id="toast" class="fixed bottom-5 right-5 z-50 transform translate-y-10 opacity-0 bg-neutral-900 text-white px-4 py-3 rounded-lg shadow-xl flex items-center gap-2 transition-all duration-300 pointer-events-none">
            <span class="material-symbols-outlined text-green-400">check_circle</span>
            <span id="toast-text">Success message</span>
        </div>

        <!-- Main Content Canvas -->
        <main class="flex-grow p-margin-mobile md:p-margin-desktop max-w-container-max w-full mx-auto space-y-stack-lg">
            
            <!-- Page Title -->
            <div>
                <h2 class="font-headline-lg text-3xl font-bold tracking-tight text-on-surface dark:text-white">Explore Events</h2>
                <p class="text-body-sm text-on-surface-variant dark:text-gray-400">Discover flagship tech conferences, specialized workshops, and corporate gatherings.</p>
            </div>

            <!-- Filter Control Bar -->
            <section class="bg-surface-container-lowest dark:bg-neutral-900/40 border border-outline-variant dark:border-neutral-800/60 p-4 rounded-xl shadow-sm grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <!-- Search bar -->
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">search</span>
                    <input type="text" id="search-input" placeholder="Search events..." class="w-full pl-10 pr-4 py-2.5 bg-surface dark:bg-neutral-800 border border-outline-variant/60 dark:border-neutral-700/60 rounded text-body-sm text-on-surface focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20 transition-all"/>
                </div>

                <!-- Category dropdown -->
                <div>
                    <select id="category-filter" class="w-full py-2.5 px-3 bg-surface dark:bg-neutral-800 border border-outline-variant/60 dark:border-neutral-700/60 rounded text-body-sm text-on-surface focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20 transition-all">
                        <option value="all">All Categories</option>
                        <option value="Conference">Conferences</option>
                        <option value="Workshop">Workshops</option>
                        <option value="Networking">Networking</option>
                    </select>
                </div>

                <!-- Location Filter -->
                <div>
                    <select id="location-filter" class="w-full py-2.5 px-3 bg-surface dark:bg-neutral-800 border border-outline-variant/60 dark:border-neutral-700/60 rounded text-body-sm text-on-surface focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20 transition-all">
                        <option value="all">All Locations</option>
                        <option value="San Francisco">San Francisco</option>
                        <option value="New York">New York</option>
                        <option value="Chicago">Chicago</option>
                        <option value="Hybrid / Silicon Valley">Silicon Valley</option>
                    </select>
                </div>

                <!-- Sort Filter -->
                <div>
                    <select id="sort-filter" class="w-full py-2.5 px-3 bg-surface dark:bg-neutral-800 border border-outline-variant/60 dark:border-neutral-700/60 rounded text-body-sm text-on-surface focus:outline-none focus:border-violet-500 focus:ring-1 focus:ring-violet-500/20 transition-all">
                        <option value="date-asc">Date: Soonest first</option>
                        <option value="date-desc">Date: Latest first</option>
                        <option value="title-asc">Alphabetical: A-Z</option>
                    </select>
                </div>
            </section>

            <!-- Events Grid -->
            <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="explore-grid">
                <!-- Dynamically populated event cards -->
            </section>

            <!-- Empty State -->
            <div id="empty-state" class="hidden flex-col items-center justify-center py-16 text-center space-y-4">
                <span class="material-symbols-outlined text-[64px] text-on-surface-variant dark:text-gray-600">event_busy</span>
                <div>
                    <h4 class="font-headline-sm text-lg font-bold text-on-surface dark:text-white">No Matching Events Found</h4>
                    <p class="text-body-sm text-on-surface-variant dark:text-gray-500">Try adjusting your filters or keyword query.</p>
                </div>
                <button id="reset-filters-btn" class="py-2 px-4 bg-violet-600 hover:bg-violet-700 text-white rounded font-label-md text-xs transition-all">Reset Filters</button>
            </div>
        </main>
    </div>

    <!-- Page Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderEventsGrid();

            // Hook up event listeners for filters
            document.getElementById('search-input').addEventListener('input', renderEventsGrid);
            document.getElementById('category-filter').addEventListener('change', renderEventsGrid);
            document.getElementById('location-filter').addEventListener('change', renderEventsGrid);
            document.getElementById('sort-filter').addEventListener('change', renderEventsGrid);

            // Reset filters click
            document.getElementById('reset-filters-btn').addEventListener('click', () => {
                document.getElementById('search-input').value = '';
                document.getElementById('category-filter').value = 'all';
                document.getElementById('location-filter').value = 'all';
                document.getElementById('sort-filter').value = 'date-asc';
                renderEventsGrid();
            });
        });

        function renderEventsGrid() {
            const user = window.EC_DB.getCurrentUser();
            const events = window.EC_DB.getEvents();

            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const category = document.getElementById('category-filter').value;
            const location = document.getElementById('location-filter').value;
            const sort = document.getElementById('sort-filter').value;

            // Apply Filters
            let filtered = events.filter(e => {
                const matchesQuery = e.title.toLowerCase().includes(query) || e.description.toLowerCase().includes(query) || e.venue.toLowerCase().includes(query);
                const matchesCat = category === 'all' || e.type === category;
                const matchesLoc = location === 'all' || e.venue.includes(location);
                return matchesQuery && matchesCat && matchesLoc;
            });

            // Apply Sorting
            filtered.sort((a, b) => {
                if (sort === 'date-asc') return new Date(a.date) - new Date(b.date);
                if (sort === 'date-desc') return new Date(b.date) - new Date(a.date);
                if (sort === 'title-asc') return a.title.localeCompare(b.title);
                return 0;
            });

            const grid = document.getElementById('explore-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
            } else {
                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');
                emptyState.classList.remove('flex');

                filtered.forEach(e => {
                    const isRegistered = user ? user.registeredEvents.includes(e.id) : false;
                    const isCompleted = e.status === 'Completed';

                    let btnClass = "w-full py-2.5 rounded font-label-md text-xs transition-all active:scale-[0.98] text-center ";
                    let btnText = "Register Now";

                    if (isCompleted) {
                        btnClass += "bg-surface-container dark:bg-neutral-800 text-on-surface-variant dark:text-gray-500 cursor-not-allowed border border-outline-variant/60 dark:border-neutral-700/60";
                        btnText = "Event Completed";
                    } else if (isRegistered) {
                        btnClass += "bg-surface-container dark:bg-neutral-800 text-on-surface dark:text-white hover:bg-opacity-90 border border-outline-variant/80 dark:border-neutral-700/60";
                        btnText = "Cancel Registration";
                    } else {
                        btnClass += "bg-violet-600 text-white hover:bg-violet-750";
                    }

                    const card = document.createElement('div');
                    card.className = "bg-surface-container-lowest dark:bg-neutral-900/40 border border-outline-variant dark:border-neutral-800/60 rounded-xl overflow-hidden shadow-sm flex flex-col justify-between h-full group hover:shadow-md transition-shadow";
                    card.innerHTML = `
                        <div>
                            <!-- Thumbnail -->
                            <div class="h-44 overflow-hidden relative">
                                <img src="${e.image}" alt="${e.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"/>
                                <span class="absolute top-3 right-3 bg-black/60 backdrop-blur-md px-2.5 py-0.5 rounded text-[10px] font-bold text-white uppercase border border-white/10">${e.type}</span>
                                ${isCompleted ? `
                                    <div class="absolute inset-0 bg-black/40 backdrop-blur-[1px] flex items-center justify-center">
                                        <span class="bg-red-600/90 text-white font-bold font-label-md text-[10px] tracking-wider uppercase px-3 py-1 rounded border border-red-500/20">Completed</span>
                                    </div>
                                ` : ''}
                            </div>

                            <!-- Content Info -->
                            <div class="p-5 space-y-4">
                                <div class="space-y-1">
                                    <h4 class="font-headline-sm text-base font-bold text-on-surface dark:text-white group-hover:text-violet-600 dark:group-hover:text-violet-400 transition-colors line-clamp-1">${e.title}</h4>
                                    <p class="text-body-sm text-[13px] text-on-surface-variant dark:text-gray-400 line-clamp-2 leading-relaxed">${e.description}</p>
                                </div>

                                <!-- Metadata -->
                                <div class="space-y-2 pt-2 border-t border-outline-variant/40 dark:border-neutral-850">
                                    <div class="flex items-center gap-2 text-body-sm text-[12px] text-on-surface-variant dark:text-gray-400">
                                        <span class="material-symbols-outlined text-[16px] text-violet-500">calendar_today</span>
                                        <span>${formatDate(e.date)}</span>
                                    </div>
                                    <div class="flex items-center gap-2 text-body-sm text-[12px] text-on-surface-variant dark:text-gray-400">
                                        <span class="material-symbols-outlined text-[16px] text-violet-500">location_on</span>
                                        <span class="truncate">${e.venue}</span>
                                    </div>
                                    <div class="flex items-center justify-between text-body-sm text-[12px] text-on-surface-variant dark:text-gray-400 pt-1">
                                        <span class="flex items-center gap-1">
                                            <span class="material-symbols-outlined text-[16px] text-violet-500">badge</span>
                                            <span>${e.price}</span>
                                        </span>
                                        <span class="font-semibold text-violet-600 dark:text-violet-400">${e.registrationsCount} / ${e.capacity} Registered</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- CTA Button -->
                        <div class="p-5 pt-0">
                            <button onclick="toggleRegister('${e.id}')" class="${btnClass}" ${isCompleted ? 'disabled' : ''}>
                                ${btnText}
                            </button>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            }
        }

        function toggleRegister(id) {
            const result = window.EC_DB.toggleEventRegistration(id);
            if (result.success) {
                showToast(result.registered ? 'Registered for event successfully!' : 'Cancelled registration.');
                renderEventsGrid();
            }
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            return date.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastText = document.getElementById('toast-text');
            toastText.innerText = message;
            
            toast.classList.remove('translate-y-10', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-10', 'opacity-0');
            }, 3000);
        }
    </script>
    <script>
        // Start shell nav
        window.EC_Nav.renderShell('explore');
    </script>
</body>
</html>
